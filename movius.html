<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIUS+</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <style>
        body { margin: 0; background: #0b0b0b; color: #fff; font-family: sans-serif; }
        
        /* HEADER */
        header { display: flex; padding: 15px; background: #111; border-bottom: 1px solid #333; align-items: center; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        .search-box { flex: 1; padding: 10px 12px; border-radius: 6px; border: none; background: #222; color: white; outline: none; }
        
        /* SIDEBAR */
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #111; transition: left 0.3s ease; z-index: 1000; border-right: 1px solid #333; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; background: #000; font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { cursor: pointer; color: #ff4444; font-size: 20px; }
        
        .menu-section { padding: 10px 20px; font-size: 12px; color: #888; text-transform: uppercase; margin-top: 10px; }
        .nav-btn { display: block; width: 100%; padding: 12px 20px; text-align: left; background: none; border: none; color: #ccc; font-size: 15px; cursor: pointer; }
        .nav-btn:hover { background: #222; color: #fff; }
        
        /* CONTENT */
        #content { padding: 15px; }
        .message { text-align: center; padding: 40px 20px; color: #aaa; line-height: 1.5; }
        
        /* GRID DE EXTENSIONES */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; text-align: center; border: 1px solid #333; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
        .card-title { font-size: 12px; padding: 10px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .card-btn { background: #e50914; color: white; border: none; padding: 10px; width: 100%; font-size: 12px; cursor: pointer; font-weight: bold; }
        
        /* FORMULARIO REPOSITORIOS */
        .repo-form { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        .repo-input { width: 100%; padding: 12px; box-sizing: border-box; background: #0b0b0b; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 15px; }
        .repo-btn { background: #e50914; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <input type="text" class="search-box" placeholder="Buscar extensión..." oninput="filterData(this.value)">
    </header>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <span>Opciones de Sistema</span>
            <span class="close-btn" onclick="toggleSidebar()">✖</span>
        </div>
        
        <div class="menu-section">Principal</div>
        <button class="nav-btn" onclick="loadView('home')">🏠 Inicio</button>
        <button class="nav-btn" onclick="loadView('favorites')">❤️ Favoritos</button>
        
        <div class="menu-section">Repositorios Oficiales</div>
        <button class="nav-btn" onclick="fetchExtensions('https://raw.githubusercontent.com/Aniyomi/aniyomi-extensions/repo/index.min.json', 'aniyomi')">🍿 Películas / Anime</button>
        <button class="nav-btn" onclick="fetchExtensions('https://raw.githubusercontent.com/mihonapp/mihon-extensions/repo/index.min.json', 'mihon')">📖 Manga / Cómics</button>
        
        <div class="menu-section">Herramientas</div>
        <button class="nav-btn" onclick="loadView('custom_repo')">🔗 Añadir Repositorio</button>
        <button class="nav-btn" onclick="loadView('downloads')">⬇️ Mis Descargas</button>
        
        <div class="menu-section">Sistema</div>
        <button class="nav-btn" onclick="loadView('settings')">⚙️ Configuración</button>
        <button class="nav-btn" onclick="loadView('about')">ℹ️ Información</button>
    </div>

    <div id="content">
        <div class="message">Selecciona una categoría en el menú para comenzar.</div>
    </div>

    <script>
        let currentData = [];
        let currentRepoBase = '';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function loadView(view) {
            toggleSidebar();
            const content = document.getElementById('content');
            
            if (view === 'home') {
                content.innerHTML = '<div class="message">Bienvenido a MOVIUS+. Usa el menú para cargar extensiones.</div>';
            } else if (view === 'custom_repo') {
                content.innerHTML = `
                    <div class="repo-form">
                        <h3>Añadir Repositorio Manual</h3>
                        <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">Pega el enlace directo (.json) de cualquier repositorio compatible con Tachiyomi, Mihon o Aniyomi.</p>
                        <input type="text" id="repoUrl" class="repo-input" placeholder="Ej: https://ejemplo.com/index.min.json">
                        <button class="repo-btn" onclick="fetchCustomRepo()">Sincronizar Extensiones</button>
                    </div>
                `;
            } else {
                content.innerHTML = `<div class="message">Sección en desarrollo: ${view}</div>`;
            }
        }

        // Función robusta para evitar el error de Chrome Local y CORS
        async function fetchWithFallback(url) {
            const proxies = [
                url, // Intento 1: Directo
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, // Intento 2: Proxy AllOrigins
                `https://corsproxy.io/?${encodeURIComponent(url)}` // Intento 3: CorsProxy
            ];

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy);
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    console.log(`Fallo intento de conexión: ${proxy}`);
                }
            }
            throw new Error("Todos los métodos de conexión fueron bloqueados.");
        }

        function fetchCustomRepo() {
            const url = document.getElementById('repoUrl').value.trim();
            if (!url) return alert("Por favor, ingresa un enlace.");
            fetchExtensions(url, 'custom');
        }

        async function fetchExtensions(url, type) {
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            
            const content = document.getElementById('content');
            content.innerHTML = '<div class="message">Conectando con el repositorio...<br><small>Esto puede tardar unos segundos dependiendo de tu conexión.</small></div>';
            
            try {
                // Extraemos la base de la URL para las descargas
                currentRepoBase = url.replace('index.min.json', '');
                
                const data = await fetchWithFallback(url);
                
                currentData = data.map(item => ({
                    name: item.name.replace('Tachiyomi: ', '').replace('Aniyomi: ', ''),
                    pkg: item.pkg,
                    icon: item.iconUrl ? currentRepoBase + item.iconUrl : '',
                    apkPath: item.apk || `apk/${item.pkg}.apk`
                }));
                
                renderGrid(currentData);
            } catch (error) {
                content.innerHTML = `<div class="message" style="color:#ff4444;">
                    <b>Error de conexión.</b><br><br>
                    Chrome está bloqueando la lectura del archivo. Intenta subir este código a ApkCreator Studio o usa un enlace válido.
                </div>`;
            }
        }

        function renderGrid(data) {
            const content = document.getElementById('content');
            if (data.length === 0) {
                content.innerHTML = '<div class="message">No se encontraron extensiones en este repositorio.</div>';
                return;
            }

            let html = '<div class="grid">';
            data.forEach(item => {
                const defaultImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='150' style='background:%23222'></svg>";
                const iconSrc = item.icon ? item.icon : defaultImg;
                
                html += `
                    <div class="card">
                        <img src="${iconSrc}" onerror="this.src='${defaultImg}'">
                        <div class="card-title">${item.name}</div>
                        <button class="card-btn" onclick="downloadApk('${item.apkPath}')">Instalar</button>
                    </div>
                `;
            });
            html += '</div>';
            content.innerHTML = html;
        }

        function filterData(query) {
            if (!currentData.length) return;
            const filtered = currentData.filter(item => item.name.toLowerCase().includes(query.toLowerCase()));
            renderGrid(filtered);
        }

        function downloadApk(apkPath) {
            const fullUrl = currentRepoBase + apkPath;
            window.location.href = fullUrl;
        }
    </script>
</body>
</html>
